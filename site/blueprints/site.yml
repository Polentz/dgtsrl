title: Site

columns:
  main:
    width: 2/3
    sections:
      pages:
        type: pages
        template:
          - home
          - ekotech
          - alumframe
          - accessori
        image:
          cover: true
          ratio: 1/1
          query: page.og_image.toFile()         
  sidebar:
    width: 1/3
    sections:
      seo:
        type: fields
        fields:
          seo_description:
            label: Descrizione
            type: textarea
            buttons: false  
          og_image:
            type: files
            multiple: false
          favicon:
            type: files
            multiple: false
