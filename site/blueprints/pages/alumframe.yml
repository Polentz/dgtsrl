title: Alumframe

columns:
  main:
    width: 2/3
    sections:
      content:
        label: Sistemi
        type: pages
        layout: list
        template: 
          - sistemi
        sortable: true
        image:
          cover: true
          ratio: 1/1
          query: page.cover.toFile()         
  sidebar:
    width: 1/3
    sections:
      seo:
        type: fields
        fields:
          seo_description:
            label: Descrizione
            type: textarea
            buttons: false     
          og_image:
            type: files
            multiple: false

